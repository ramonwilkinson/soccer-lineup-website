name: Deploy

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::356697480979:role/GithubActionsRole
          aws-region: us-east-1

      - name: Install infrastructure dependencies
        working-directory: infrastructure
        run: npm ci

      - name: Deploy infrastructure
        working-directory: infrastructure
        run: npx cdk deploy --require-approval never --outputs-file cdk-outputs.json

      - name: Read CDK outputs
        id: cdk_outputs
        run: |
          API_URL=$(python3 -c "import json; print(json.load(open('infrastructure/cdk-outputs.json'))['SoccerLineupStack']['ApiUrl'])")
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT

      - name: Install app dependencies
        run: npm ci

      - name: Build app
        run: npm run build
        env:
          VITE_API_URL: ${{ steps.cdk_outputs.outputs.api_url }}

      - name: Deploy to S3
        run: aws s3 sync dist/ s3://singlepageappstack-websitebucket75c24d94-jnd0ky85fl7d/soccer-lineup/ --delete

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id E2Y1TS0W36ENN3 --paths "/soccer-lineup/*"
