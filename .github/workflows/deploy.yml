name: Deploy

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::356697480979:role/GithubActionsRole
          aws-region: us-east-1

      - name: Deploy to S3
        run: aws s3 sync dist/ s3://singlepageappstack-websitebucket75c24d94-jnd0ky85fl7d/soccer-lineup/ --delete

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id E2Y1TS0W36ENN3 --paths "/soccer-lineup/*"
